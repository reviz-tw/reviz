<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <!-- Import Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="{{ "" | relURL }}" class="logo">{{ .Site.Title }}</a>
                <ul>
                    <li><a href="{{ "services/" | relURL }}">服務項目</a></li>
                    <li><a href="{{ "portfolio/" | relURL }}">Portfolio</a></li>
                    <li><a href="{{ "about/" | relURL }}">公司介紹</a></li>
                    <li><a href="{{ "news/" | relURL }}">最新消息</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        {{ block "main" . }}
        <!-- Main content will be rendered here -->
        {{ end }}
    </main>

    <footer>
        <div class="container">
            <p>&copy; {{ now.Year }} {{ .Site.Title }}. All rights reserved. Crafted with excellence.</p>
        </div>
    </footer>
</body>
</html>
