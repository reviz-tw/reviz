{{ define "title" }}{{ .Title }} | 最新消息{{ end }}

{{ define "main" }}
<div class="container">
    <div class="glass" style="max-width: 900px; margin: 4rem auto; padding: 4rem;">
        <div class="article-header">
            <a href="{{ "/news/" | relURL }}" style="display: inline-block; margin-bottom: 2rem;">&larr; Back to News</a>
            <div class="article-meta">Published on {{ .PublishDate.Format "January 2, 2006" }}</div>
            <h1 style="font-size: 3rem;">{{ .Title }}</h1>
        </div>
        
        <div class="article-content">
            <!-- This injects the compiled Markdown content -->
            {{ .Content }}
        </div>
    </div>
</div>
{{ end }}
